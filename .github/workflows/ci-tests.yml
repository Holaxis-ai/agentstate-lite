name: CI tests

# The repo's test gate, run where it previously never ran: on every PR and every push to main,
# across a Node {20, 25} matrix (LTS floor per the CLI's engine requirement + current) on ubuntu —
# tasks/ci-test-workflow, item 1 of plans/test-suite-confidence. This catches the environmental
# defect class (e.g. node-version-dependent gzip bytes) that a single-machine gate cannot.
#
# The gate itself is ONE step running root `npm run check` — the same command CLAUDE.md names as
# the pre-ship gate — so the CI surface cannot drift from the local one (the parallel-surfaces
# drift class this plan targets). The steps before it are environment setup only. `check` covers:
# build, typecheck, workspace tests (board-git + core + cli + server + ui), test:scripts,
# verify:npm-package, check:skill, and the e2e chromium lane (deterministic since #69's drain fix).
#
# The chromium pre-install exists because e2e:gate's own `playwright install chromium` does not
# install OS-level dependencies; `--with-deps` here does, and makes the gate's install a no-op.
#
# The committed plugin bundle's drift gates (check:bundle / check:skill:bundle) are deliberately
# absent: those artifacts are BOT-OWNED on merge to main (ci-version-bundle.yml), and a PR branch
# is not expected to carry a current rebuild of them.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  AGENTSTATE_LITE_NO_AUTOPULL: 1

jobs:
  gate:
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 25]
    name: gate (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Install chromium with OS dependencies for the e2e lane
        run: npx playwright install --with-deps chromium
        working-directory: packages/ui

      - name: Run the repository gate (npm run check)
        run: npm run check
