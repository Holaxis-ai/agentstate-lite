<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Review requests</title>
<style>
:root{color-scheme:light dark;--paper:#fffefa;--ink:#19212b;--muted:#68727d;--line:#d9d6ce;--navy:#173b57;--soft:#e5f0f5}*{box-sizing:border-box}body{margin:0;background:#f4f2ed;color:var(--ink);font:15px/1.5 system-ui,sans-serif}header{padding:24px max(20px,5vw);background:var(--navy);color:white}h1{margin:0;font:500 32px Georgia,serif}header p{margin:5px 0 0;opacity:.75}main{max-width:1000px;margin:auto;padding:28px max(20px,5vw)}.card{background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:20px;margin:0 0 14px}.top{display:flex;justify-content:space-between;gap:16px}.title{font:500 23px Georgia,serif}.status{font:700 11px ui-monospace,monospace;text-transform:uppercase;background:var(--soft);padding:5px 9px;border-radius:999px}.meta{color:var(--muted);font-size:13px;margin-top:8px}.question{font:500 18px Georgia,serif;margin-top:16px}.empty,.error{text-align:center;color:var(--muted);padding:15vh 10px}.error{color:#a8463d}@media(prefers-color-scheme:dark){:root{--paper:#17212a;--ink:#edf1f4;--muted:#a3afb9;--line:#34414c;--soft:#203846}body{background:#111820}}
</style>
</head>
<body>
<header><h1>Review requests</h1><p id="state">Connecting to this bundle…</p></header>
<main id="app"><div class="empty">Subscribing before reading…</div></main>
<script>
(function(){
  "use strict";
  var seq=0,pending=Object.create(null),listeners=[],app=document.getElementById("app"),state=document.getElementById("state");
  function request(type,extra){return new Promise(function(resolve,reject){var id=String(++seq),message={bridge:"v0",id:id,type:type};pending[id]={resolve:resolve,reject:reject};Object.assign(message,extra||{});parent.postMessage(message,"*")})}
  window.addEventListener("message",function(event){if(event.source!==parent)return;var message=event.data;if(!message||message.bridge!=="v0")return;if(message.type==="change"){listeners.slice().forEach(function(listener){listener()});return}var item=pending[message.id];if(!item)return;delete pending[message.id];if(message.type==="error")item.reject(new Error(message.error&&message.error.message||"Bridge error"));else item.resolve(message.result)});
  function esc(value){return String(value==null?"":value).replace(/[&<>"']/g,function(char){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[char]})}
  function reload(){state.textContent="Refreshing…";return request("query",{params:{type:"Review Request"}}).then(function(result){var rows=(result.rows||[]).slice().sort(function(a,b){return String(b.frontmatter.timestamp||"").localeCompare(String(a.frontmatter.timestamp||""))});state.textContent=rows.length+" durable request"+(rows.length===1?"":"s")+" · live";if(!rows.length){app.innerHTML='<div class="empty">No Review Requests yet. This Page will update when one is created.</div>';return}app.innerHTML=rows.map(function(row){var value=row.frontmatter||{};return '<article class="card"><div class="top"><div><div class="title">'+esc(value.title||row.id)+'</div><div class="meta">Reviewer: '+esc(value.reviewer||"not named")+' · Requested by: '+esc(value.requested_by||"not named")+'</div></div><span class="status">'+esc(value.status||"unknown")+'</span></div><div class="question">'+esc(value.question||"No review question supplied")+'</div></article>'}).join("")}).catch(function(error){state.textContent="Read failed";app.innerHTML='<div class="error">'+esc(error.message)+'</div>'})}
  listeners.push(reload);
  request("subscribe").then(reload).catch(function(error){state.textContent="Subscription failed";app.innerHTML='<div class="error">'+esc(error.message)+'</div>'});
})();
</script>
</body>
</html>
